<!DOCTYPE html>
<html lang="zh-CN" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/favicon.ico">
    <title>城轨安全相关方看板</title>
    <link href="/static/fonts.css" rel="stylesheet">
    <script src="/static/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        crrc: {
                            red: '#C70019',
                            darkRed: '#93000F',
                        },
                        surface: {
                            base: '#131313',
                            lowest: '#0E0E0E',
                            low: '#1B1B1B',
                            high: '#2A2A2A',
                            highest: '#353535',
                            bright: '#393939',
                            variant: 'rgba(53, 53, 53, 0.4)',
                        },
                        text: {
                            primary: '#FFFFFF',
                            secondary: '#E2E2E2',
                            muted: '#A0A0A0'
                        }
                    },
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        glow: '0 0 10px rgba(199, 0, 25, 0.5)',
                        'inner-glow': 'inset 0 0 5px rgba(199, 0, 25, 0.5)',
                        ambient: '0 10px 30px rgba(226, 226, 226, 0.06)',
                    }
                }
            }
        }
    </script>
    <script src="/static/echarts.min.js"></script>
    <link href="/static/mermaid.min.css" rel="stylesheet" />
    <script src="/static/gridjs.umd.js"></script>

    <style>
        body {
            background-color: #131313;
            color: #E2E2E2;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0E0E0E;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #2A2A2A;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #393939;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Glassmorphism */
        .glass-panel {
            background-color: rgba(53, 53, 53, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
        }

        /* Table Styles - No Lines Rule */
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th {
            background-color: #0E0E0E;
            color: #A0A0A0;
            font-weight: 500;
            text-align: left;
            padding: 14px 16px;
            font-size: 0.875rem;
            white-space: nowrap;
        }

        th:first-child {
            border-top-left-radius: 8px;
        }

        th:last-child {
            border-top-right-radius: 8px;
        }

        td {
            padding: 14px 16px;
            background-color: #1B1B1B;
            border-bottom: 4px solid #131313;
            font-size: 0.875rem;
        }

        tr:last-child td:first-child {
            border-bottom-left-radius: 8px;
        }

        tr:last-child td:last-child {
            border-bottom-right-radius: 8px;
        }

        tr:hover td {
            background-color: #2A2A2A;
            transition: background-color 0.2s;
        }

        /* Input underline focus */
        .input-glow:focus {
            border-bottom-color: #C70019;
            outline: none;
        }

        /* Status Chips */
        .chip {
            padding: 2px 10px;
            font-size: 0.6875rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            border-radius: 6px;
        }

        .chip-working {
            background-color: rgba(199, 0, 25, 0.2);
            color: #FFFFFF;
            box-shadow: 0 0 10px rgba(199, 0, 25, 0.2);
        }

        .chip-entered {
            background-color: rgba(255, 255, 255, 0.1);
            color: #E2E2E2;
        }

        .chip-completed {
            background-color: rgba(42, 42, 42, 0.8);
            color: #A0A0A0;
        }

        .chip-other {
            background-color: rgba(27, 27, 27, 1);
            color: #A0A0A0;
        }

        /* Button gradient */
        .btn-primary {
            background: linear-gradient(180deg, #C70019 0%, #93000F 100%);
            box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.2);
            border-radius: 6px;
        }

        /* Utility class for rounded corners */
        .rounded-panel {
            border-radius: 12px;
        }

        /* Grid.js Custom Theme for Kinetic Command */
        .gridjs-container {
            font-family: 'Inter', sans-serif;
            color: #E2E2E2;
            width: 100% !important;
        }

        .gridjs-wrapper {
            box-shadow: none !important;
            border: none !important;
            border-radius: 0 !important;
            background-color: transparent !important;
        }

        .gridjs-table {
            width: 100% !important;
            border-collapse: collapse !important;
            border: none !important;
        }

        .gridjs-thead {
            background-color: #0E0E0E !important;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .gridjs-th {
            background-color: #0E0E0E !important;
            color: #A0A0A0 !important;
            border: none !important;
            font-weight: 500 !important;
            padding: 10px 16px !important;
            font-size: 0.875rem !important;
        }

        .gridjs-tr {
            background-color: #1B1B1B !important;
        }

        .gridjs-tr:hover {
            background-color: #2A2A2A !important;
        }

        .gridjs-td {
            border: none !important;
            border-bottom: 2px solid #131313 !important;
            padding: 8px 16px !important;
            color: #E2E2E2 !important;
            background-color: transparent !important;
            font-size: 0.875rem !important;
        }

        /* Make sure GridJS search and pagination inputs match dark theme */
        .gridjs-search-input,
        .gridjs-pagination .gridjs-pages button {
            background-color: #131313 !important;
            color: #E2E2E2 !important;
            border: 1px solid #353535 !important;
        }

        .gridjs-pagination .gridjs-pages button:hover {
            background-color: #2A2A2A !important;
        }

        .gridjs-pagination .gridjs-pages button.gridjs-currentPage {
            background-color: #C70019 !important;
            color: white !important;
            border-color: #C70019 !important;
        }

        .gridjs-footer {
            background-color: #0E0E0E !important;
            border: none !important;
            box-shadow: none !important;
            padding: 8px 16px !important;
        }

        .gridjs-summary {
            color: #A0A0A0 !important;
        }

        .gridjs-head {
            width: 100%;
            padding: 16px 24px;
            background-color: transparent;
        }

        .gridjs-head .gridjs-search {
            float: right;
        }
    </style>
</head>

<body class="min-h-screen p-6 flex flex-col gap-6">

    <!-- Header -->
    <header class="flex justify-between items-center glass-panel p-4 shadow-ambient z-10">
        <div class="flex items-center gap-4">
            <img src="/static/中车.png" alt="中车Logo" class="w-12 h-12 object-contain" />
            <div>
                <h1 class="text-3xl font-display font-bold text-white tracking-wider uppercase">生产指挥驾驶舱 相关方安全看板</h1>
                <p class="text-text-muted text-lg font-display tracking-widest uppercase mt-1">城轨制造中心</p>
            </div>
        </div>

        <!-- Global Time Search -->
        <div id="time-filters" class="flex gap-1 bg-surface-lowest p-1 rounded-panel">
            <button
                class="time-filter-btn btn-primary text-white text-sm font-bold px-6 py-2 shadow-glow uppercase cursor-pointer rounded-md">每日</button>
            <button
                class="time-filter-btn bg-surface-low text-text-secondary hover:bg-surface-high text-sm px-6 py-2 transition-colors uppercase cursor-pointer rounded-md">每周</button>
            <button
                class="time-filter-btn bg-surface-low text-text-secondary hover:bg-surface-high text-sm px-6 py-2 transition-colors uppercase cursor-pointer rounded-md">每月</button>
            <button
                class="time-filter-btn bg-surface-low text-text-secondary hover:bg-surface-high text-sm px-6 py-2 transition-colors uppercase cursor-pointer rounded-md">每季</button>
            <button
                class="time-filter-btn bg-surface-low text-text-secondary hover:bg-surface-high text-sm px-6 py-2 transition-colors uppercase cursor-pointer rounded-md">每年</button>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="flex-1 grid grid-cols-12 gap-6">

        <!-- Left Column: Status Distributions -->
        <div class="col-span-3 flex flex-col gap-6">
            <!-- Overall Status -->
            <div
                class="bg-surface-low p-6 shadow-ambient relative group flex-1 min-h-[250px] flex flex-col rounded-panel overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                </div>
                <h2 class="font-display text-xl mb-2 text-white uppercase tracking-wide">当日作业状态</h2>
                <div id="chart-overall-status" class="flex-1 w-full min-h-[200px]"></div>
            </div>
            <!-- Assembly Status -->
            <div
                class="bg-surface-low p-6 shadow-ambient relative group flex-1 min-h-[250px] flex flex-col rounded-panel overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                </div>
                <h2 class="font-display text-xl mb-2 text-white uppercase tracking-wide">当日总成组装板块状态</h2>
                <div id="chart-assembly-status" class="flex-1 w-full min-h-[200px]"></div>
            </div>
            <!-- Delivery Status -->
            <div
                class="bg-surface-low p-6 shadow-ambient relative group flex-1 min-h-[250px] flex flex-col rounded-panel overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                </div>
                <h2 class="font-display text-xl mb-2 text-white uppercase tracking-wide">当日调试交付板块状态</h2>
                <div id="chart-delivery-status" class="flex-1 w-full min-h-[200px]"></div>
            </div>
        </div>

        <!-- Middle Column: Metrics & Table -->
        <div class="col-span-6 flex flex-col gap-6">

            <!-- Metrics Grid -->
            <div class="grid grid-cols-4 gap-4">
                <div class="bg-surface-low p-4 shadow-ambient border-t-2 border-crrc-red rounded-panel">
                    <p class="text-text-muted text-[10px] uppercase tracking-wider mb-2">当日作业总人数</p>
                    <p id="metric-today-total" class="font-display text-4xl text-white">-</p>
                </div>
                <div class="bg-surface-low p-4 shadow-ambient rounded-panel">
                    <p class="text-text-muted text-[10px] uppercase tracking-wider mb-2">当日总成组装人数</p>
                    <p id="metric-today-assembly" class="font-display text-4xl text-white">-</p>
                </div>
                <div class="bg-surface-low p-4 shadow-ambient rounded-panel">
                    <p class="text-text-muted text-[10px] uppercase tracking-wider mb-2">当日调试交付人数</p>
                    <p id="metric-today-delivery" class="font-display text-4xl text-white">-</p>
                </div>
                <div class="bg-surface-low p-4 shadow-ambient rounded-panel">
                    <p class="text-text-muted text-[10px] uppercase tracking-wider mb-2">当日厂外作业人数</p>
                    <p id="metric-today-outside" class="font-display text-4xl text-white">-</p>
                </div>
                <div class="bg-surface-low p-4 shadow-ambient border-t-2 border-surface-highest rounded-panel">
                    <p class="text-text-muted text-[10px] uppercase tracking-wider mb-2">本月作业总人数</p>
                    <p id="metric-month-total" class="font-display text-4xl text-text-secondary">-</p>
                </div>
                <div class="bg-surface-low p-4 shadow-ambient border-t-2 border-surface-highest rounded-panel">
                    <p class="text-text-muted text-[10px] uppercase tracking-wider mb-2">本月总成组装人数</p>
                    <p id="metric-month-assembly" class="font-display text-4xl text-text-secondary">-</p>
                </div>
                <div class="bg-surface-low p-4 shadow-ambient border-t-2 border-surface-highest rounded-panel">
                    <p class="text-text-muted text-[10px] uppercase tracking-wider mb-2">本月调试交付人数</p>
                    <p id="metric-month-delivery" class="font-display text-4xl text-text-secondary">-</p>
                </div>
                <div class="bg-surface-low p-4 shadow-ambient border-t-2 border-surface-highest rounded-panel">
                    <p class="text-text-muted text-[10px] uppercase tracking-wider mb-2">本月厂外作业人数</p>
                    <p id="metric-month-outside" class="font-display text-4xl text-text-secondary">-</p>
                </div>
            </div>

            <!-- Detail Table -->
            <div class="bg-surface-low shadow-ambient flex-1 flex flex-col relative group overflow-hidden">
                <!-- Table Title -->
                <div class="px-6 pt-6 pb-2 flex justify-between items-center z-10">
                    <h2 class="font-display text-xl text-white uppercase tracking-wide">当日相关方作业明细</h2>
                </div>
                <div id="gridjs-wrapper"></div>
            </div>

        </div>

        <!-- Right Column: Approvals & Hazards -->
        <div class="col-span-3 flex flex-col gap-6">
            <!-- Approval Department -->
            <div
                class="bg-surface-low p-6 shadow-ambient relative group flex-1 min-h-[250px] flex flex-col rounded-panel overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                </div>
                <h2 class="font-display text-xl mb-2 text-white uppercase tracking-wide">当日审批部门</h2>
                <div id="chart-approval-dept" class="flex-1 w-full min-h-[200px]"></div>
            </div>

            <!-- Approval Contrast -->
            <div
                class="bg-surface-low p-6 shadow-ambient relative group flex-1 min-h-[250px] flex flex-col rounded-panel overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                </div>
                <h2 class="font-display text-xl mb-2 text-white uppercase tracking-wide text-base"
                    title="申请数据与当日审批数据对比">申请与审批数据对比</h2>
                <div id="chart-approval-contrast" class="flex-1 w-full min-h-[200px]"></div>
            </div>

            <!-- Hazardous Operations -->
            <div
                class="bg-surface-low p-6 shadow-ambient relative group flex-1 min-h-[250px] flex flex-col rounded-panel overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                </div>
                <h2 class="font-display text-xl mb-2 text-white uppercase tracking-wide">危险性作业</h2>
                <p class="text-[10px] text-text-muted mb-2">点击柱状图查看具体作业信息 (仅显示有数据项)</p>
                <div id="chart-hazards" class="flex-1 w-full min-h-[180px] cursor-pointer"></div>
            </div>
        </div>
    </main>

    <!-- ECharts Initialization -->
    <script>
        // Colors from Design System
        const COLORS = {
            working: '#C70019',
            entered: '#494646',
            completed: '#2A2A2A',
            text: '#E2E2E2',
            textMuted: '#A0A0A0',
            bg: 'transparent'
        };

        const commonTextOpts = {
            color: COLORS.text,
            fontFamily: 'Inter, sans-serif'
        };

        const initChart = (id, options) => {
            const dom = document.getElementById(id);
            let chart = null;
            if (dom) {
                chart = echarts.init(dom, 'dark', { renderer: 'svg' });
                const baseOptions = {
                    backgroundColor: COLORS.bg,
                    textStyle: commonTextOpts,
                    tooltip: {
                        backgroundColor: 'rgba(27, 27, 27, 0.95)',
                        borderColor: '#353535',
                        textStyle: { color: '#E2E2E2', fontSize: 12 },
                        padding: [10, 14]
                    }
                };
                chart.setOption(Object.assign({}, baseOptions, options));

                if (id === 'chart-hazards') {
                    chart.on('click', function (params) {
                        alert('钻取危险作业详情:\n作业类型: ' + params.name + '\n当前数量: ' + params.value + ' 项');
                    });
                }

                window.addEventListener('resize', () => chart.resize());
            }
            return chart;
        };

                labelLine: { show: false },

        const assemblyStatusChart = initChart('chart-assembly-status', {

                type: 'pie',
                radius: ['45%', '70%'],
                center: ['50%', '45%'],

                label: { show: false },
                emphasis: { label: { show: true, fontSize: 16, fontWeight: 'bold', color: '#FFF' } },
                data: []
            }]
        });

        const approvalDeptChart = initChart('chart-approval-dept', {
            tooltip: { trigger: 'item', formatter: '{a} <br/>{b}: {c} ({d}%)' },
            legend: { bottom: '0%', textStyle: { color: COLORS.textMuted, fontSize: 11 }, itemWidth: 8, itemHeight: 8 },
            series: [{
                name: '审批部门',
                type: 'pie',
                radius: ['45%', '70%'],
                center: ['50%', '45%'],
                itemStyle: { borderColor: '#1B1B1B', borderWidth: 2 },
                label: { show: false },
                emphasis: { label: { show: true, fontSize: 16, fontWeight: 'bold', color: '#FFF' } },
                data: []
            }]
        });

        const approvalContrastChart = initChart('chart-approval-contrast', {
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '5%', top: '15%', containLabel: true },
            xAxis: {
                type: 'category',
                data: [],
                axisLine: { show: false },
                axisTick: { show: false },

            },

            grid: { left: '3%', right: '4%', bottom: '5%', top: '15%', containLabel: true },

                axisTick: { show: false },

            { applicant: '徐强强', company: '兰普电器股份有限公司', status: '已进入', start: '2026-04-07 上午', end: '2026-04-10 上午', location: '总成组装板块', detail: '部件装配作业' },

        const getStatusChip = (status) => {
            const baseClass = "chip uppercase tracking-wider";
            if (status === '正在作业') return `<span class="${baseClass} chip-working">${status}</span>`;
            if (status === '已进入') return `<span class="${baseClass} chip-entered">${status}</span>`;
            if (status === '作业完成') return `<span class="${baseClass} chip-completed">${status}</span>`;
            return `<span class="${baseClass} chip-other">${status}</span>`;
        };

        const grid = new gridjs.Grid({
            columns: [
                {
                    id: 'applicant',
                    name: '申请人'
                },
                {
                    id: 'company',
                    name: '公司名称',
                    formatter: (cell) => gridjs.html(`<div class="truncate max-w-[120px] text-text-secondary" title="${cell}">${cell}</div>`)
                },
                {
                    id: 'status',
                    name: '作业状态',
                    formatter: (cell) => gridjs.html(getStatusChip(cell))
                },
                {
                    id: 'start',
                    name: '计划开工',
                    formatter: (cell) => gridjs.html(`<div class="text-text-muted leading-tight">${cell.replace(' ', '<br>')}</div>`)
                },
                {
                    id: 'end',
                    name: '计划完工',
                    formatter: (cell) => gridjs.html(`<div class="text-text-muted leading-tight">${cell.replace(' ', '<br>')}</div>`)
                },
                {
                    id: 'location',
                    name: '作业地点'
                },
                {
                    id: 'detail',
                    name: '具体作业内容',
                    formatter: (cell) => gridjs.html(`<div class="truncate max-w-[100px] text-text-secondary" title="${cell}">${cell}</div>`)
                }
            ],
            data: [],
            sort: true,
            pagination: {
                enabled: true,
                limit: 10,
                summary: false
            },
            language: {
                pagination: {
                    previous: '上一页',
                    next: '下一页',
                    showing: '显示',
                    results: () => '条结果'
                },
                noRecordsFound: '没有找到相关记录'
            }
        });

        grid.render(document.getElementById("gridjs-wrapper"));

        // Fetch data from backend
        let rawTableData = [];
        let currentGridInstance = null;

        async function fetchDashboardData(timeFilter = '每日') {
            try {
                // Append the time filter as a query parameter
                const response = await fetch(`/api/dashboard-data?time=${encodeURIComponent(timeFilter)}`);
                const data = await response.json();

                // Update Metrics
                document.getElementById('metric-today-total').innerText = data.metrics.today_total;
                document.getElementById('metric-today-assembly').innerText = data.metrics.today_assembly;
                document.getElementById('metric-today-delivery').innerText = data.metrics.today_delivery;
                document.getElementById('metric-today-outside').innerText = data.metrics.today_outside || '-';

                document.getElementById('metric-month-total').innerText = data.metrics.month_total;
                document.getElementById('metric-month-assembly').innerText = data.metrics.month_assembly;
                document.getElementById('metric-month-delivery').innerText = data.metrics.month_delivery;
                document.getElementById('metric-month-outside').innerText = data.metrics.month_outside;

                // Update Charts
                // Setup styling for specific items in charts
                const styleOverallStatus = data.charts.overall_status.map(item => {
                    if (item.name === '正在作业') return { ...item, itemStyle: { color: COLORS.working, shadowBlur: 10, shadowColor: 'rgba(199, 0, 25, 0.5)' } };
                    if (item.name === '已进入') return { ...item, itemStyle: { color: '#E2E2E2' } };
                    return { ...item, itemStyle: { color: '#353535' } };
                });
                overallStatusChart?.setOption({ series: [{ data: styleOverallStatus }] });

                const styleAssemblyStatus = data.charts.assembly_status.map(item => {
                    if (item.name === '正在作业') return { ...item, itemStyle: { color: COLORS.working } };
                    if (item.name === '已进入') return { ...item, itemStyle: { color: '#E2E2E2' } };
                    return { ...item, itemStyle: { color: '#353535' } };
                });
                assemblyStatusChart?.setOption({ series: [{ data: styleAssemblyStatus }] });

                const styleDeliveryStatus = data.charts.delivery_status.map(item => {
                    if (item.name === '正在作业') return { ...item, itemStyle: { color: COLORS.working } };
                    if (item.name === '已进入') return { ...item, itemStyle: { color: '#E2E2E2' } };
                    return { ...item, itemStyle: { color: '#353535' } };
                });
                deliveryStatusChart?.setOption({ series: [{ data: styleDeliveryStatus }] });

                const styleApprovalDept = data.charts.approval_dept.map(item => {
                    if (item.name === '质量技术部') return { ...item, itemStyle: { color: '#E2E2E2' } };
                    if (item.name === '总成组装板块') return { ...item, itemStyle: { color: '#353535' } };
                    return { ...item, itemStyle: { color: '#494646' } };
                });
                approvalDeptChart?.setOption({ series: [{ data: styleApprovalDept }] });

                approvalContrastChart?.setOption({
                    xAxis: { data: data.charts.approval_contrast.categories },
                    series: [{
                        data: [
                            { value: data.charts.approval_contrast.values[0], itemStyle: { color: '#E2E2E2' } },
                            { value: data.charts.approval_contrast.values[1], itemStyle: { color: COLORS.working } }
                        ]
                    }]
                });

                hazardsChart?.setOption({
                    xAxis: { data: data.charts.hazards.categories },
                    series: [{
                        data: [
                            { value: data.charts.hazards.values[0], itemStyle: { color: COLORS.working } },
                            { value: data.charts.hazards.values[1], itemStyle: { color: '#E2E2E2' } },
                            { value: data.charts.hazards.values[2], itemStyle: { color: '#353535' } }
                        ]
                    }]
                });

                // Update Grid.js Table
                grid.updateConfig({
                    data: data.table_data
                }).forceRender();

            } catch (error) {
                console.error("Failed to fetch dashboard data:", error);
            }
        }

        // Call the fetch function
        fetchDashboardData();

        // Time Filter Buttons Toggle Logic
        const timeFilterBtns = document.querySelectorAll('.time-filter-btn');
        const activeClasses = ['btn-primary', 'text-white', 'font-bold', 'shadow-glow'];
        const inactiveClasses = ['bg-surface-low', 'text-text-secondary', 'hover:bg-surface-high'];

        timeFilterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active state from all buttons
                timeFilterBtns.forEach(b => {
                    b.classList.remove(...activeClasses);
                    b.classList.add(...inactiveClasses);
                });

                // Add active state to clicked button
                btn.classList.remove(...inactiveClasses);
                btn.classList.add(...activeClasses);

                // Trigger data fetch based on the selected time filter
                fetchDashboardData(btn.innerText);
            });
        });

    </script>
